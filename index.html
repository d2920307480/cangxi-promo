  var loaderBar = $('loaderBar');
  var loaderPct = $('loaderPct');
  var mainNav   = $('mainNav');
  var navBack   = $('navBack');
  var page0     = $('page-0');
  var lightbox  = $('lightbox');
  var lbImg     = $('lightboxImg');
  var lbCap     = $('lightboxCap');

  /* ===== LOADER ===== */
  function initLoader() {
    var imgs = document.querySelectorAll('img[src]');
    var total = imgs.length;
    var loaded = 0;

    function update() {
      var p = Math.round(loaded / total * 100);
      if (loaderBar) loaderBar.style.width = p + '%';
      if (loaderPct) loaderPct.textContent = p + '%';
      if (loaded >= total) {
        setTimeout(function() {
          if (loader) loader.classList.add('done');
          document.body.style.overflow = '';
        }, 300);
      }
    }

    if (total === 0) {
      if (loader) loader.classList.add('done');
      document.body.style.overflow = '';
      return;
    }

    imgs.forEach(function(img) {
      if (img.complete) { loaded++; update(); }
      else {
        img.addEventListener('load', function() { loaded++; update(); });
        img.addEventListener('error', function() { loaded++; update(); });
      }
    });

    setTimeout(function() {
      if (loader && !loader.classList.contains('done')) {
        loaderBar.style.width = '100%';
        loaderPct.textContent = '100%';
        setTimeout(function() {
          if (loader) loader.classList.add('done');
          document.body.style.overflow = '';
        }, 300);
      }
    }, 8000);
  }

  /* ===== RENDER ===== */
  function renderHome() {
    if (!page0) return;

    var secsHTML = SITE.sections.map(function(s) {
      var bodyHTML = s.body.map(function(p) { return '<p>' + p + '</p>'; }).join('');
      var quoteHTML = s.quoteHtml || '';
      return '<div class="sec-card reveal"><div class="sec-card-head"><span class="sec-card-num">' + s.num + '</span><span class="sec-card-title">' + s.title + '</span></div><div class="sec-card-body">' + bodyHTML + quoteHTML + '</div></div>';
    }).join('');

    var charsHTML = SITE.people.map(function(p) {
      var avatar = p.avatarType === 'image'
        ? '<img src="' + p.avatarSrc + '" class="char-card-avatar" alt="' + (p.avatarAlt || '') + '" loading="lazy">'
        : '<div class="char-card-avatar placeholder">' + p.avatarChar + '</div>';
      return '<div class="char-card reveal" data-go="' + p.id + '">' + avatar + '<div class="char-card-info"><div class="char-card-name">' + p.name + '</div><div class="char-card-tag">' + p.tag + '</div><div class="char-card-desc">' + p.desc + '</div></div><span class="char-card-arrow">\u203a</span></div>';
    }).join('');

    var m = SITE.meta;
    page0.innerHTML =
      '<div class="hero"><div class="hero-bg"><img src="' + m.heroBg + '" alt="' + m.heroBgAlt + '"></div><div class="hero-content"><div class="hero-series">' + m.seriesBadge + '</div><h1>' + m.heroTitle + '<span class="em">' + m.heroTitleEm + '</span></h1><p class="sub">' + m.heroSub + '</p></div></div>'
      + '<div class="intro-quote reveal">' + SITE.intro.html + '</div>'
      + '<div class="sections">' + secsHTML + '</div>'
      + '<div class="char-section"><div class="char-section-title">人物纪实</div><div class="char-cards">' + charsHTML + '</div></div>'
      + '<div class="ending reveal">' + SITE.ending.html + '</div>'
      + '<div class="footer">' + m.footer + '</div>';
  }

  function renderPerson(person) {
    var page = $('page-' + person.id);
    if (!page) return;

    var poemsHTML = '';
    if (person.poems) {
      poemsHTML = person.poems.map(function(p, i) {
        var uid = 'poem-' + person.id + '-' + i;
        var full = '';
        if (p.hasMore) {
          full = '<div class="poem-full" id="' + uid + '"><div class="poem-full-inner" style="white-space:pre-line">' + p.full + '</div></div><div class="poem-toggle" data-poem="' + uid + '">展开全文 \u25bc</div>';
        }
        return '<div class="poem-card reveal"><div class="title">' + p.title + '</div><div class="verse">' + p.preview + full + '</div><div class="divider"></div></div>';
      }).join('');
    }

    var pullHTML = person.pullQuote
      ? '<div class="poet-pull reveal"><p>' + person.pullQuote + '</p><div class="attr">' + person.pullAttr + '</div></div>'
      : '';

    var extraBioHTML = person.extraBio ? '<div class="person-bio reveal">' + person.extraBio + '</div>' : '';

    var galleryHTML = '';
    if (person.gallery) {
      galleryHTML = '<div class="gallery">' + person.gallery.map(function(row) {
        return '<div class="gallery-row">' + row.rows.map(function(it) {
          return '<div class="gallery-item reveal" data-lightbox="' + it.src + '" data-lightbox-cap="' + it.cap + '"><img src="' + it.src + '" alt="' + it.alt + '" loading="lazy"><div class="cap">' + it.cap + '</div></div>';
        }).join('') + '</div>';
      }).join('') + '</div>';
    }

    var timelineHTML = '';
    if (person.timeline) {
      timelineHTML = '<div class="timeline">' + person.timeline.map(function(t) {
        return '<div class="tl-item tl-reveal"><span class="year">' + t.year + '</span>' + t.text + '</div>';
      }).join('') + '</div>';
    }

    var storyHTML = '';
    if (person.storyTitle && person.storyBody) {
      storyHTML = '<div class="person-story reveal"><h3>' + person.storyTitle + '</h3>' + person.storyBody.map(function(p) { return '<p>' + p + '</p>'; }).join('') + '</div>';
    }

    page.innerHTML =
      '<div class="page-header"><h2>' + person.headerTitle + '</h2><p class="tagline">' + person.headerTagline + '</p></div>'
      + '<div class="person-bio reveal">' + person.bio + '</div>'
      + poemsHTML + pullHTML + extraBioHTML + galleryHTML + storyHTML + timelineHTML
      + '<div class="footer" style="padding-top:8px">' + SITE.meta.footer + '</div>';
  }

  /* ===== NAVIGATION ===== */
  function goPage(n) {
    if (n === currentPage) return;

    if (n === 0) { mainNav.classList.add('dark'); }
    else { mainNav.classList.remove('dark'); }
    navBack.classList.toggle('visible', n !== 0);

    var oldP = $('page-' + currentPage);
    var newP = $('page-' + n);

    if (n !== 0 && newP && !newP.hasAttribute('data-rendered')) {
      renderPerson(SITE.people[n - 1]);
      newP.setAttribute('data-rendered', '1');
    }

    if (oldP) { oldP.classList.remove('active'); oldP.classList.add('page-exit'); setTimeout(function() { oldP.classList.remove('page-exit'); }, 500); }
    if (newP) { newP.classList.add('active'); newP.scrollTop = 0; }
    currentPage = n;

    observeAll();
  }

  /* ===== LIGHTBOX ===== */
  function openLightbox(src, cap) {
    if (lbImg) lbImg.src = src;
    if (lbCap) lbCap.textContent = cap || '';
    if (lightbox) lightbox.classList.add('active');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    if (lightbox) lightbox.classList.remove('active');
    document.body.style.overflow = '';
  }

  /* ===== POEM TOGGLE ===== */
  function togglePoem(el) {
    var uid = el.getAttribute('data-poem');
    var full = document.getElementById(uid);
    if (!full) return;
    if (full.classList.contains('open')) { full.classList.remove('open'); el.textContent = '展开全文 \u25bc'; }
    else { full.classList.add('open'); el.textContent = '收起 \u25b2'; }
  }

  /* ===== INTERSECTION OBSERVERS ===== */
  function observeAll() {
    // Reveal
    document.querySelectorAll('.reveal:not(.observed)').forEach(function(el) {
      el.classList.add('observed');
      new IntersectionObserver(function(entries, obs) {
        entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
      }, { threshold: 0.12, rootMargin: '0px 0px -30px 0px' }).observe(el);
    });
    // Timeline
    document.querySelectorAll('.tl-reveal:not(.tl-observed)').forEach(function(el) {
      el.classList.add('tl-observed');
      new IntersectionObserver(function(entries, obs) {
        entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
      }, { threshold: 0.15 }).observe(el);
    });
  }

  /* ===== EVENT DELEGATION ===== */
  document.addEventListener('click', function(e) {
    // Char cards
    var card = e.target.closest('.char-card');
    if (card) { var n = parseInt(card.getAttribute('data-go')); if (!isNaN(n)) goPage(n); return; }
    // Gallery
    var gi = e.target.closest('.gallery-item');
    if (gi && !e.target.closest('.lightbox')) { openLightbox(gi.getAttribute('data-lightbox'), gi.getAttribute('data-lightbox-cap')); return; }
    // Poem toggle
    var pt = e.target.closest('.poem-toggle');
    if (pt) { togglePoem(pt); return; }
  });

  /* ===== NAV SCROLL ===== */
  if (page0) {
    page0.addEventListener('scroll', function() {
      if (currentPage !== 0) return;
      if (this.scrollTop > 200) { mainNav.classList.remove('dark'); }
      else { mainNav.classList.add('dark'); }
    });
  }

  /* ===== GLOBAL LISTENERS ===== */
  if (navBack) navBack.addEventListener('click', function() { goPage(0); });
  if (lightbox) lightbox.addEventListener('click', closeLightbox);
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape' && lightbox && lightbox.classList.contains('active')) closeLightbox(); });

  /* ===== INIT ===== */
  renderHome();
  initLoader();
  observeAll();

  window.goPage = goPage;
})();
</script>
</body>
</html>
